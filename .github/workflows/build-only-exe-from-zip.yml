name: Build Sistemi Genit EXE from ZIP

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and extract source ZIP
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter "*.zip" -File |
            Where-Object { $_.Name -notlike "*win-unpacked*" } |
            Select-Object -First 1

          if (-not $zip) {
            throw "Nuk u gjet asnjë ZIP në root të repository-t."
          }

          $extractDir = Join-Path $env:RUNNER_TEMP "sistemi-genit-source"
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath $extractDir -Force

          $packageJson = Get-ChildItem -Path $extractDir -Filter "package.json" -File -Recurse |
            Select-Object -First 1

          if (-not $packageJson) {
            throw "ZIP-i nuk përmban package.json."
          }

          $projectDir = $packageJson.Directory.FullName
          "PROJECT_DIR=$projectDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "ZIP: $($zip.FullName)"
          Write-Host "Project: $projectDir"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.PROJECT_DIR }}/package-lock.json

      - name: Install dependencies
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}
        run: npm ci

      - name: Build Windows Setup EXE only
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm run build:frontend
          npx electron-builder --win nsis --x64 --config.win.signAndEditExecutable=false

      - name: Verify EXE
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "${{ env.PROJECT_DIR }}\release" -Filter "Sistemi-Genit-Setup-*.exe" -File |
            Select-Object -First 1

          if (-not $exe) {
            throw "Build përfundoi, por Setup EXE nuk u gjet."
          }

          Write-Host "EXE u krijua: $($exe.FullName)"
          Write-Host "Madhësia: $([math]::Round($exe.Length / 1MB, 2)) MB"

      - name: Upload only Setup EXE
        uses: actions/upload-artifact@v4
        with:
          name: Sistemi-Genit-Setup-EXE
          path: ${{ env.PROJECT_DIR }}/release/Sistemi-Genit-Setup-*.exe
          if-no-files-found: error
          retention-days: 30
