name: Build Sistemi Genit Setup EXE from ZIP

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and extract source ZIP
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter "*.zip" -File |
            Where-Object { $_.Name -notlike "*win-unpacked*" } |
            Select-Object -First 1

          if (-not $zip) {
            throw "Nuk u gjet asnje ZIP ne root te repository-t."
          }

          $extractDir = Join-Path $env:RUNNER_TEMP "sistemi-genit-source"
          if (Test-Path $extractDir) {
            Remove-Item $extractDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath $extractDir -Force

          $packageJson = Get-ChildItem -Path $extractDir -Filter "package.json" -File -Recurse |
            Select-Object -First 1

          if (-not $packageJson) {
            throw "ZIP-i nuk permban package.json."
          }

          $projectDir = $packageJson.Directory.FullName
          "PROJECT_DIR=$projectDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "ZIP: $($zip.FullName)"
          Write-Host "Project: $projectDir"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Pa cache, sepse package-lock.json ndodhet brenda ZIP-it
          # dhe krijohet vetem pasi ZIP-i ekstraktohet.

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-Location $env:PROJECT_DIR

          if (Test-Path "package-lock.json") {
            npm ci
          }
          else {
            npm install
          }

      - name: Build Windows Setup EXE
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          Set-Location $env:PROJECT_DIR

          npm run build:frontend

          npx electron-builder `
            --win nsis `
            --x64 `
            --config.win.signAndEditExecutable=false

      - name: Copy only Setup EXE
        shell: pwsh
        run: |
          $exe = Get-ChildItem `
            -Path (Join-Path $env:PROJECT_DIR "release") `
            -Filter "Sistemi-Genit-Setup-*.exe" `
            -File |
            Select-Object -First 1

          if (-not $exe) {
            throw "Build perfundoi, por Setup EXE nuk u gjet."
          }

          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "artifact"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null

          Copy-Item $exe.FullName `
            -Destination (Join-Path $artifactDir $exe.Name) `
            -Force

          Write-Host "EXE u krijua: $($exe.FullName)"
          Write-Host "Madhesia: $([math]::Round($exe.Length / 1MB, 2)) MB"

      - name: Upload only Setup EXE
        uses: actions/upload-artifact@v4
        with:
          name: Sistemi-Genit-Setup-EXE
          path: artifact/*.exe
          if-no-files-found: error
          retention-days: 30
